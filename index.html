<style>
  :root{
    --bg: #12161c;
    --bg-panel: #1a2029;
    --bg-card: #212836;
    --bg-card-hover: #262f3f;
    --line: #2c3444;
    --line-soft: #232a37;
    --amber: #ff9f2e;
    --amber-dim: #7a5a2c;
    --teal: #34c3b0;
    --violet: #9b8cff;
    --gold: #f2b705;
    --red: #ef5757;
    --red-dim: #4a2626;
    --green: #4ade80;
    --text: #e8ecf3;
    --text-dim: #8b93a3;
    --text-faint: #5c6577;
    --radius: 10px;
    --shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  body.light{
    --bg: #eef0f4;
    --bg-panel: #ffffff;
    --bg-card: #ffffff;
    --bg-card-hover: #f4f6f9;
    --line: #e1e4ea;
    --line-soft: #edeff3;
    --amber: #d9720c;
    --amber-dim: #f4c48a;
    --teal: #0e8f81;
    --violet: #7c5cf5;
    --gold: #ad7d0a;
    --red: #e0453a;
    --red-dim: #fbdad6;
    --green: #16a34a;
    --text: #161a22;
    --text-dim: #5c6472;
    --text-faint: #97a0ad;
    --shadow: 0 10px 28px rgba(15,23,42,0.09);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    min-height:100vh;
    transition: background .15s, color .15s;
  }
  .mono{ font-family:'JetBrains Mono', monospace; }
  .disp{ font-family:'Oswald', sans-serif; text-transform:uppercase; letter-spacing:0.03em; }

  ::-webkit-scrollbar{ height:10px; width:10px; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:6px; }
  ::-webkit-scrollbar-track{ background:transparent; }

  #app{ max-width:1600px; margin:0 auto; padding:18px 22px 60px; }

  header.top{
    display:flex; align-items:center; justify-content:space-between;
    gap:16px; flex-wrap:wrap;
    padding-bottom:16px; margin-bottom:16px;
    border-bottom:1px solid var(--line);
  }
  .brand{ display:flex; align-items:center; gap:12px; }
  .brand .mark{
    width:40px;height:40px;border-radius:9px;
    background:#ffffff;
    display:flex;align-items:center;justify-content:center;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.06), 0 4px 14px rgba(0,0,0,0.10);
    flex-shrink:0; padding:4px; overflow:hidden;
  }
  .brand .mark img{ width:100%; height:100%; object-fit:contain; }
  .brand h1{ font-size:19px; margin:0; font-weight:600; letter-spacing:0.01em; }
  .brand .sub{ font-size:11.5px; color:var(--text-dim); margin-top:1px; }

  .week-nav-group{ display:flex; align-items:center; gap:8px; }
  .week-nav{ display:flex; align-items:center; gap:10px; background:var(--bg-panel); border:1px solid var(--line); border-radius:999px; padding:5px 6px; }
  .week-nav button{
    width:30px;height:30px;border-radius:999px;border:none;background:transparent;color:var(--text);
    cursor:pointer; display:flex;align-items:center;justify-content:center; font-size:15px;
  }
  .week-nav button:hover{ background:var(--bg-card-hover); }
  .week-nav .label{ font-family:'Oswald',sans-serif; font-size:13.5px; letter-spacing:0.03em; padding:0 6px; min-width:190px; text-align:center; }
  .today-btn{
    background:var(--bg-panel); border:1px solid var(--line); border-radius:999px; padding:8px 16px;
    font-size:12.5px; font-family:'Oswald',sans-serif; letter-spacing:0.03em; font-weight:600;
    color:var(--amber); cursor:pointer; white-space:nowrap;
  }
  .today-btn:hover{ background:var(--bg-card-hover); border-color:var(--amber-dim); }

  .actions{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .btn{
    display:inline-flex; align-items:center; gap:6px;
    background:var(--bg-card); border:1px solid var(--line); color:var(--text);
    padding:8px 14px; border-radius:8px; font-size:12.5px; cursor:pointer; font-weight:500;
    transition: border-color .15s, background .15s;
  }
  .btn:hover{ background:var(--bg-card-hover); border-color:var(--amber-dim); }
  .btn.primary{ background:var(--amber); color:#1a1204; border-color:var(--amber); font-weight:600; }
  .btn.primary:hover{ background:#ffb254; }
  .btn.small{ padding:5px 10px; font-size:11.5px; }
  .conn-badge{
    display:inline-flex; align-items:center; font-size:11px; font-weight:600; padding:7px 11px;
    border-radius:999px; border:1px solid var(--line); background:var(--bg-card); white-space:nowrap;
  }
  .conn-badge.conn-live{ color:var(--green); border-color:rgba(74,222,128,0.4); }
  .conn-badge.conn-offline{ color:var(--red); border-color:rgba(239,87,87,0.4); }
  .conn-badge.conn-connecting{ color:var(--amber); border-color:var(--amber-dim); }
  .conn-badge.conn-local{ color:var(--text-dim); }
  .theme-toggle{
    width:34px;height:34px;border-radius:999px; border:1px solid var(--line); background:var(--bg-card);
    cursor:pointer; display:flex;align-items:center;justify-content:center; font-size:15px; color:var(--text);
  }
  .theme-toggle:hover{ background:var(--bg-card-hover); }
  input[type=file]{ display:none; }

  .legend-bar{ display:flex; gap:16px; flex-wrap:wrap; align-items:center; margin-bottom:14px; padding:8px 12px; background:var(--bg-panel); border:1px solid var(--line); border-radius:8px; }
  .legend-item{ display:flex; align-items:center; gap:6px; font-size:10.5px; color:var(--text-dim); }
  .legend-swatch{ width:11px; height:11px; border-radius:3px; display:inline-block; flex-shrink:0; }
  .legend-swatch.sw-solo1{ background:var(--teal); }
  .legend-swatch.sw-solo2{ background:var(--violet); }
  .legend-swatch.sw-solo5{ background:var(--gold); }
  .legend-swatch.sw-grounded{ background:var(--amber); }
  .legend-swatch.sw-down{ background:var(--red); }
  .legend-swatch.sw-rejected{ background:rgba(239,87,87,0.5); border:1px solid var(--red); }
  .stats{ display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
  .search-bar{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .search-input{
    flex:1; max-width:380px; background:var(--bg-panel); border:1px solid var(--line); color:var(--text);
    padding:9px 12px; border-radius:8px; font-size:12.5px;
  }
  .search-input:focus{ outline:none; border-color:var(--amber-dim); }
  .search-count{ font-size:11.5px; color:var(--text-dim); }
  .search-clear{
    background:var(--bg-card); border:1px solid var(--line); color:var(--text-dim);
    width:26px; height:26px; border-radius:999px; cursor:pointer; font-size:12px;
  }
  .search-clear:hover{ color:var(--red); border-color:var(--red); }  .stat{ background:var(--bg-panel); border:1px solid var(--line); border-radius:8px; padding:9px 14px; min-width:120px; }
  .stat .n{ font-family:'Oswald',sans-serif; font-size:20px; font-weight:600; }
  .stat .l{ font-size:10.5px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.05em; margin-top:1px;}
  .stat.warn .n{ color:var(--red); }
  .stat.ok .n{ color:var(--green); }

  .timeline-toggle{ display:flex; gap:8px; margin-bottom:12px; }
  .pill-toggle{
    background:var(--bg-panel); border:1px solid var(--line); color:var(--text-dim);
    padding:7px 14px; border-radius:999px; font-size:12px; cursor:pointer; font-weight:500;
  }
  .pill-toggle.active{ background:var(--amber); color:#1a1204; border-color:var(--amber); font-weight:600; }
  .timeline-note{ font-size:11px; color:var(--text-dim); background:var(--bg-panel); border:1px solid var(--line); border-radius:8px; padding:8px 12px; margin-bottom:14px; line-height:1.6; }
  .timeline-wrap{ overflow-x:auto; }
  .timeline-inner{ min-width:820px; background:var(--bg-panel); border:1px solid var(--line); border-radius:12px; overflow:hidden; }
  .timeline-axis{ display:flex; border-bottom:1px solid var(--line); background:var(--bg-card); }
  .timeline-axis-label{ width:150px; flex-shrink:0; }
  .timeline-axis-days{ flex:1; display:flex; }
  .timeline-axis-days .day{ flex:1; text-align:center; font-size:10px; color:var(--text-dim); padding:8px 2px; border-left:1px solid var(--line-soft); font-family:'JetBrains Mono',monospace; }
  .timeline-row{ display:flex; align-items:center; border-bottom:1px solid var(--line-soft); min-height:44px; }
  .timeline-row:last-child{ border-bottom:none; }

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// ====== SUPABASE CONFIG — fill these in with your project's values ======
// Supabase dashboard → Project Settings → API
const SUPABASE_URL = 'https://mrgxpyfuazmshddpvdbg.supabase.co';        // e.g. https://abcdefgh.supabase.co
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yZ3hweWZ1YXptc2hkZHB2ZGJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMjAzMzQsImV4cCI6MjA5OTY5NjMzNH0.vV2pRslOYUl32AvN2bzmvhyv8tFQ_LSnYyLL4Lvue_k';
// ==========================================================================

const BOARD_ROW_ID = 'main'; // single shared row holding the whole board state
const sbReady = SUPABASE_URL.indexOf('YOUR_SUPABASE_URL') !== 0 && window.supabase;
const sb = sbReady ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
let suppressRealtime = false; // avoids re-rendering off our own write
let lastKnownUpdatedAt = null; // for optimistic-concurrency check before overwriting
let connectionStatus = sb ? 'connecting' : 'local'; // 'connecting' | 'live' | 'offline' | 'local'

let STATE = { trucks: [], drivers: [], blocks: [], theme: 'dark' };
let VIEW = { weekStart: null, editingCsv: null, showTrucks:false, showDrivers:false, searchQuery:'', mode:'board', timelineBy:'driver', selectedTruckIds: [], showHistory:false, historyList:null };
const STORE_KEY = 'dispatch-board-data-v1';

const DUR = { solo1: 14*60, solo2: 38*60, solo5: 110*60 };
const TRUCK_TYPES = [
  {value:'daycab', label:'Daycab'},
  {value:'sleeper', label:'Sleeper'},
  {value:'solo5', label:'Solo 5'}
];
const BLOCK_TYPES = [
  {value:'solo1', label:'SOLO 1', hours:14},
  {value:'solo2', label:'SOLO 2', hours:38},
  {value:'solo5', label:'SOLO 5', hours:110}
];
function nextBlockType(t){
  const i = BLOCK_TYPES.findIndex(function(x){ return x.value===t; });
  return BLOCK_TYPES[(i+1) % BLOCK_TYPES.length].value;
}
const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function uid(p){ return (p||'id')+'_'+Math.random().toString(36).slice(2,10); }

function toDateOnly(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function getWeekStart(d){
  const dt = toDateOnly(d);
  dt.setDate(dt.getDate() - dt.getDay());
  return dt;
}
function addDays(d, n){ const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function fmtISO(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtShort(d){ return d.getDate()+' '+MONTHS[d.getMonth()]; }
function fmtWeekLabel(ws){
  const we = addDays(ws,6);
  const sameMonth = ws.getMonth()===we.getMonth();
  return sameMonth
    ? `${ws.getDate()}\u2013${we.getDate()} ${MONTHS[ws.getMonth()]} ${we.getFullYear()}`
    : `${fmtShort(ws)} \u2013 ${fmtShort(we)} ${we.getFullYear()}`;
}
function fmtDateTime(d){
  const dt = new Date(d);
  return dt.toLocaleString(undefined, {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
}
function parseCsvDT(str){
  if(!str) return null;
  const m = str.trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2}):(\d{2})/);
  if(!m) return null;
  const yr = +m[3], mo = +m[1], da = +m[2], hh = +m[4], mi = +m[5];
  return new Date(yr, mo-1, da, hh, mi);
}
function timeToMinutes(hhmm){ const p = hhmm.split(':'); return (+p[0])*60+(+p[1]); }
function blockStartDT(b){ const d = new Date(b.date+'T00:00:00'); const p = b.anchorTime.split(':'); d.setHours(+p[0],+p[1],0,0); return d; }
function blockEndDT(b){ return new Date(blockStartDT(b).getTime() + DUR[b.type]*60000); }
function fmtEndLabel(b){
  const end = blockEndDT(b);
  const endISO = fmtISO(new Date(end.getFullYear(), end.getMonth(), end.getDate()));
  const hh = String(end.getHours()).padStart(2,'0');
  const mm = String(end.getMinutes()).padStart(2,'0');
  const time = hh+':'+mm;
  return endISO===b.date ? ('Ends '+time) : ('Ends '+time+' \u00b7 '+fmtShort(end));
}

async function loadState(){
  if(sb){
    try{
      const { data, error } = await sb.from('board_state').select('data, updated_at').eq('id', BOARD_ROW_ID).maybeSingle();
      if(error) throw error;
      if(data && data.data){
        STATE = data.data;
        lastKnownUpdatedAt = data.updated_at || null;
      } else {
        // First run ever: seed the shared row so everyone starts from the same place.
        const nowIso = new Date().toISOString();
        await sb.from('board_state').upsert({ id: BOARD_ROW_ID, data: STATE, updated_at: nowIso });
        lastKnownUpdatedAt = nowIso;
      }
    }catch(e){
      console.error('Supabase load failed, check SUPABASE_URL/SUPABASE_ANON_KEY and RLS policy.', e);
      showToast('Could not connect to shared board — check console / Supabase config');
    }
  } else {
    // Fallback for local testing without Supabase configured yet.
    try{
      const res = await window.storage.get(STORE_KEY, false);
      if(res && res.value){ STATE = JSON.parse(res.value); }
    }catch(e){}
  }
  if(!STATE.trucks) STATE.trucks=[];
  if(!STATE.drivers) STATE.drivers=[];
  if(!STATE.blocks) STATE.blocks=[];
  if(!STATE.theme) STATE.theme='dark';
}

let saveTimer=null;
function saveState(opts){
  opts = opts || {};
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    if(sb){
      try{
        // Optimistic-concurrency check: if someone else saved since we last loaded/saved,
        // don't silently clobber their change -- warn and let the person reload first.
        if(!opts.force){
          const { data: current, error: checkErr } = await sb.from('board_state').select('updated_at').eq('id', BOARD_ROW_ID).maybeSingle();
          if(!checkErr && current && lastKnownUpdatedAt && current.updated_at && current.updated_at !== lastKnownUpdatedAt){
            showConflictWarning();
            return;
          }
        }
        suppressRealtime = true;
        const nowIso = new Date().toISOString();
        const { error } = await sb.from('board_state').upsert({ id: BOARD_ROW_ID, data: STATE, updated_at: nowIso });
        if(error) throw error;
        lastKnownUpdatedAt = nowIso;
        // Best-effort snapshot for the version history / safety net. Never blocks the main save.
        maybeSnapshot();
      }catch(e){
        console.error('Supabase save failed.', e);
        showToast('Could not save to shared board — check console / Supabase config');
      }finally{
        // small delay so our own realtime echo (if any) doesn't bounce the UI
        setTimeout(function(){ suppressRealtime = false; }, 400);
      }
    } else {
      try{
        await window.storage.set(STORE_KEY, JSON.stringify(STATE), false);
      }
      catch(e){
        /* Auto-save isn't available in this environment (e.g. running as a local file,
           or an unpublished artifact). Fails silently — use Export/Import to back up. */
      }
    }
  }, 150);
}

function showConflictWarning(){
  const overlay = el('div',{class:'overlay'});
  const modal = el('div',{class:'modal'});
  modal.appendChild(el('div',{class:'modal-head'},[ el('h2',{}, '\u26a0 Someone else just made changes') ]));
  const body = el('div',{class:'modal-body'});
  body.appendChild(el('p',{style:'font-size:13px; line-height:1.7; margin:0;'},
    'Another person saved to this board a moment ago. Saving your change now would overwrite theirs. Reload to get the latest version, then redo your change.'));
  modal.appendChild(body);
  modal.appendChild(el('div',{class:'modal-foot'},[
    el('button',{class:'btn primary', onclick:function(){ window.location.reload(); }}, '\u21bb Reload now')
  ]));
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
}

function subscribeRealtime(){
  if(!sb) return;
  sb.channel('board_state_changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'board_state', filter: 'id=eq.' + BOARD_ROW_ID }, function(payload){
      if(suppressRealtime) return;
      const incoming = payload.new && payload.new.data;
      if(!incoming) return;
      STATE = incoming;
      lastKnownUpdatedAt = (payload.new && payload.new.updated_at) || lastKnownUpdatedAt;
      if(!STATE.trucks) STATE.trucks=[];
      if(!STATE.drivers) STATE.drivers=[];
      if(!STATE.blocks) STATE.blocks=[];
      if(!STATE.theme) STATE.theme='dark';
      render();
    })
    .subscribe(function(status){
      if(status==='SUBSCRIBED') connectionStatus = 'live';
      else if(status==='CHANNEL_ERROR' || status==='TIMED_OUT') connectionStatus = 'offline';
      else if(status==='CLOSED') connectionStatus = 'offline';
      render();
    });
}

const SNAPSHOT_MIN_GAP_MS = 60*60*1000; // at most one backup snapshot per hour, no matter how many saves happen
const BACKUP_RETENTION_DAYS = 180; // ~6 months
let snapshottingInProgress = false;

// Only actually writes a new backup row if it's been more than an hour since the last one
// (checked against the shared table, not just this browser, so it works across everyone using the board).
async function maybeSnapshot(){
  if(!sb || snapshottingInProgress) return;
  snapshottingInProgress = true;
  try{
    const { data: latest, error: peekErr } = await sb.from('board_backups')
      .select('created_at').order('created_at', {ascending:false}).limit(1).maybeSingle();
    if(peekErr) throw peekErr;
    const last = latest ? new Date(latest.created_at).getTime() : 0;
    if(Date.now() - last >= SNAPSHOT_MIN_GAP_MS){
      const { error } = await sb.from('board_backups').insert({ data: STATE });
      if(error) throw error;
      pruneOldBackups();
    }
  }catch(e){
    console.error('Snapshot skipped (non-critical):', e);
  }finally{
    snapshottingInProgress = false;
  }
}

let pruningInProgress = false;
async function pruneOldBackups(){
  if(!sb || pruningInProgress) return;
  pruningInProgress = true;
  try{
    const cutoff = new Date(Date.now() - BACKUP_RETENTION_DAYS*24*60*60*1000).toISOString();
    const { error } = await sb.from('board_backups').delete().lt('created_at', cutoff);
    if(error) throw error;
  }catch(e){
    console.error('Backup pruning skipped (non-critical):', e);
  }finally{
    pruningInProgress = false;
  }
}

async function fetchBackupList(){
  if(!sb) return [];
  try{
    const { data, error } = await sb.from('board_backups').select('id, created_at').order('created_at', {ascending:false}).limit(25);
    if(error) throw error;
    return data || [];
  }catch(e){
    console.error('Could not fetch backup history.', e);
    return [];
  }
}

async function restoreBackup(id){
  if(!sb) return;
  try{
    const { data, error } = await sb.from('board_backups').select('data').eq('id', id).maybeSingle();
    if(error) throw error;
    if(data && data.data){
      STATE = data.data;
      if(!STATE.trucks) STATE.trucks=[];
      if(!STATE.drivers) STATE.drivers=[];
      if(!STATE.blocks) STATE.blocks=[];
      if(!STATE.theme) STATE.theme='dark';
      saveState({force:true});
      VIEW.showHistory=false;
      showToast('Restored from backup');
      render();
    }
  }catch(e){
    console.error('Restore failed.', e);
    showToast('Could not restore that backup — check console', true);
  }
}

function checkConflict(truckId, block){
  if(!truckId) return null;
  const s = blockStartDT(block), e = blockEndDT(block);
  for(const b of STATE.blocks){
    if(b.id===block.id) continue;
    if(b.rejected) continue;
    if(b.truckId!==truckId) continue;
    const bs = blockStartDT(b), be = blockEndDT(b);
    if(s < be && bs < e) return b;
  }
  return null;
}
function checkDriverConflict(driverName, block){
  if(!driverName) return null;
  const norm = driverName.trim().toLowerCase();
  if(!norm) return null;
  const s = blockStartDT(block), e = blockEndDT(block);
  for(const b of STATE.blocks){
    if(b.id===block.id) continue;
    if(b.rejected) continue;
    if((b.driverName||'').trim().toLowerCase()!==norm) continue;
    const bs = blockStartDT(b), be = blockEndDT(b);
    if(s < be && bs < e) return b;
  }
  return null;
}

function truckIsFreeFor(truckId, block){
  const test = Object.assign({}, block, {truckId: truckId});
  return !checkConflict(truckId, test);
}

function dayBounds(date){
  const start = new Date(date.getFullYear(), date.getMonth(), date.getDate(), 0,0,0,0);
  const end = new Date(start.getTime() + 24*60*60000);
  return [start, end];
}

function blocksOverlappingDay(date){
  const b0 = dayBounds(date)[0], b1 = dayBounds(date)[1];
  return STATE.blocks.filter(function(b){
    if(b.rejected) return false;
    const bs = blockStartDT(b), be = blockEndDT(b);
    return bs < b1 && b0 < be;
  });
}

// Peak number of trucks needed simultaneously at any moment during this day
// (sweep-line over start/end events of every block whose interval touches the day)
function peakConcurrentDemand(date){
  const overlapping = blocksOverlappingDay(date);
  if(overlapping.length===0) return 0;
  const events = [];
  overlapping.forEach(function(b){
    events.push([blockStartDT(b).getTime(), 1]);
    events.push([blockEndDT(b).getTime(), -1]);
  });
  events.sort(function(a,b){ return a[0]-b[0] || a[1]-b[1]; }); // ends before starts on ties
  let count=0, max=0;
  events.forEach(function(ev){ count+=ev[1]; if(count>max) max=count; });
  return max;
}

function availableTruckCount(){
  return STATE.trucks.filter(function(t){ return t.status!=='down'; }).length;
}

function truckShortageForDay(date){
  return Math.max(0, peakConcurrentDemand(date) - availableTruckCount());
}

function spareTrucksForDay(date){
  const b0 = dayBounds(date)[0], b1 = dayBounds(date)[1];
  const busy = new Set();
  STATE.blocks.forEach(function(b){
    if(!b.truckId) return;
    if(b.rejected) return;
    const bs = blockStartDT(b), be = blockEndDT(b);
    if(bs < b1 && b0 < be) busy.add(b.truckId);
  });
  return STATE.trucks.filter(function(t){ return t.status!=='down' && !busy.has(t.id); });
}

function el(tag, attrs, children){
  attrs = attrs || {}; children = children || [];
  const e = document.createElement(tag);
  for(const k in attrs){
    if(k==='class') e.className = attrs[k];
    else if(k==='html') e.innerHTML = attrs[k];
    else if(k.indexOf('on')===0) e.addEventListener(k.slice(2), attrs[k]);
    else if(attrs[k]!==null && attrs[k]!==undefined) e.setAttribute(k, attrs[k]);
  }
  (Array.isArray(children)?children:[children]).forEach(function(c){
    if(c==null) return;
    if(typeof c==='string') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  });
  return e;
}

function showToast(msg, isErr){
  const t = el('div', {class:'toast'+(isErr?' err':'')}, msg);
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 3200);
}

let localTheme = null; // per-browser only, never synced to the shared board
function getSystemTheme(){
  return (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
}
function initLocalTheme(){
  try{
    const saved = localStorage.getItem('theme-pref');
    localTheme = saved || getSystemTheme();
  }catch(e){
    localTheme = getSystemTheme();
  }
  // If the person never manually chose a theme, keep following the system live.
  if(window.matchMedia){
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e){
      let hasManualPref = false;
      try{ hasManualPref = !!localStorage.getItem('theme-pref'); }catch(err){}
      if(!hasManualPref){
        localTheme = e.matches ? 'dark' : 'light';
        render();
      }
    });
  }
}

function applyTheme(){
  document.body.className = localTheme==='light' ? 'light' : '';
}

function render(){
  applyTheme();
  const app = document.getElementById('app');
  app.innerHTML='';
  app.appendChild(renderHeader());
  app.appendChild(renderLegend());
  app.appendChild(renderStats());
  if(VIEW.mode==='board'){
    app.appendChild(renderSearchBar());
    app.appendChild(renderBoard());
  } else {
    app.appendChild(renderTimeline());
  }
  if(VIEW.showTrucks) app.appendChild(renderTrucksModal());
  if(VIEW.showDrivers) app.appendChild(renderDriversModal());
  if(VIEW.editingCsv) app.appendChild(renderCsvModal());
  if(VIEW.showHistory) app.appendChild(renderHistoryModal());
  ensureDatalist();
  maybeScrollToToday();
}

function renderLegend(){
  const item = function(swatchClass, label){
    return el('div',{class:'legend-item'},[
      el('span',{class:'legend-swatch '+swatchClass}),
      el('span',{}, label)
    ]);
  };
  return el('div',{class:'legend-bar'},[
    item('sw-solo1','Solo 1'),
    item('sw-solo2','Solo 2'),
    item('sw-solo5','Solo 5'),
    item('sw-grounded','Grounded truck'),
    item('sw-down','Down truck'),
    item('sw-rejected','Rejected block'),
  ]);
}

let hasScrolledToToday = false;
function maybeScrollToToday(){
  if(hasScrolledToToday) return;
  if(VIEW.mode!=='board') return;
  const todayIso = fmtISO(toDateOnly(new Date()));
  const weekIso = fmtISO(VIEW.weekStart);
  const todayWeek = fmtISO(getWeekStart(new Date()));
  if(weekIso!==todayWeek) return; // only auto-scroll when viewing the current week
  const el2 = document.querySelector('.day-col .day-head.today');
  if(el2){
    hasScrolledToToday = true;
    setTimeout(function(){ el2.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'}); }, 50);
  }
}

function withFocusPreserved(fn){
  const active = document.activeElement;
  const id = active && active.id;
  const selStart = active && typeof active.selectionStart==='number' ? active.selectionStart : null;
  const selEnd = active && typeof active.selectionEnd==='number' ? active.selectionEnd : null;
  fn();
  if(id){
    const el2 = document.getElementById(id);
    if(el2){
      el2.focus();
      if(selStart!=null && el2.setSelectionRange){
        try{ el2.setSelectionRange(selStart, selEnd); }catch(err){}
      }
    }
  }
}

function blockMatchesSearch(b){
  const q = VIEW.searchQuery.trim().toLowerCase();
  if(!q) return true;
  if((b.driverName||'').toLowerCase().indexOf(q)!==-1) return true;
  if((b.blockId||'').toLowerCase().indexOf(q)!==-1) return true;
  if(b.truckId){
    const t = STATE.trucks.find(function(x){ return x.id===b.truckId; });
    if(t && t.number.toLowerCase().indexOf(q)!==-1) return true;
  }
  return false;
}

function renderSearchBar(){
  const q = VIEW.searchQuery;
  const matchCount = q.trim() ? currentWeekBlocks().filter(blockMatchesSearch).length : null;
  const input = el('input',{id:'searchInput', class:'search-input', placeholder:'\ud83d\udd0d Search driver or truck number (this week)\u2026', value:q,
    oninput:function(e){ VIEW.searchQuery = e.target.value; withFocusPreserved(render); }
  });
  const wrap = el('div',{class:'search-bar'}, [input]);
  if(q.trim()){
    wrap.appendChild(el('span',{class:'search-count'}, matchCount+' match'+(matchCount===1?'':'es')));
    wrap.appendChild(el('button',{class:'search-clear', onclick:function(){ VIEW.searchQuery=''; render(); }}, '\u2715'));
  }
  return wrap;
}

function exportData(){
  const blob = new Blob([JSON.stringify(STATE, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'truck-assignment-backup-'+fmtISO(new Date())+'.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showToast('Backup file downloaded');
}

function handleImportFile(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      const data = JSON.parse(ev.target.result);
      if(!data || typeof data!=='object') throw new Error('bad file');
      STATE = data;
      if(!STATE.trucks) STATE.trucks=[];
      if(!STATE.drivers) STATE.drivers=[];
      if(!STATE.blocks) STATE.blocks=[];
      if(!STATE.theme) STATE.theme='dark';
      saveState();
      showToast('Backup restored');
      render();
    }catch(err){
      showToast('Could not read that file \u2014 make sure it\u2019s a backup exported from this tool', true);
    }
  };
  reader.readAsText(file);
  e.target.value='';
}

function renderConnectionBadge(){
  if(!sb){
    return el('span',{class:'conn-badge conn-local', title:'Running in local mode (no shared database configured)'}, '\u26aa Local');
  }
  if(connectionStatus==='live'){
    return el('span',{class:'conn-badge conn-live', title:'Connected \u2014 changes sync live with everyone viewing this board'}, '\ud83d\udfe2 Live');
  }
  if(connectionStatus==='connecting'){
    return el('span',{class:'conn-badge conn-connecting', title:'Connecting to the shared board\u2026'}, '\ud83d\udfe1 Connecting');
  }
  return el('span',{class:'conn-badge conn-offline', title:'Not connected \u2014 changes may not be saved or synced. Check your internet connection.'}, '\ud83d\udd34 Offline');
}

  const modal = el('div',{class:'modal'});
  modal.appendChild(el('div',{class:'modal-head'},[
    el('h2',{}, '\ud83d\udd50 Version History'),
    el('button',{class:'x', onclick:function(){ VIEW.showHistory=false; render(); }}, '\u2715')
  ]));
  const body = el('div',{class:'modal-body'});
  if(!sb){
    body.appendChild(el('div',{class:'empty-state'}, 'Version history needs a connected shared board (Supabase). Not available in local mode.'));

  } else {
    body.appendChild(el('div',{class:'csv-note'}, '\ud83d\udd39 Every save automatically keeps a snapshot here. Restoring replaces the current shared board for everyone \u2014 this can\u2019t be undone, so double-check before restoring.'));

    table.appendChild(el('tr',{},[ el('th',{},'Saved at'), el('th',{},'') ]));

  modal.appendChild(body);

  return overlay;
}

  ]);
}

function currentWeekBlocks(){
  const ws = fmtISO(VIEW.weekStart);
  return STATE.blocks.filter(function(b){ return b.weekStart===ws; });
}

const HOS_WEEKLY_LIMIT_HOURS = 70;
const HOS_RESET_HOURS = 34;

function weekWindow(weekStart){
  const start = new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate(), 0,0,0,0);
  const end = new Date(start.getTime() + 7*24*60*60000);
  return [start, end];
}

// Sum of scheduled hours (nominal block duration, not verified drive time) for a driver
// across this week's active blocks. This is a scheduling estimate, not certified HOS tracking.
function driverWeeklyHours(driverName){
  const blocks = currentWeekBlocks().filter(function(b){
    return !b.rejected && (b.driverName||'').trim().toLowerCase()===driverName.trim().toLowerCase();
  });
  let mins = 0;
  blocks.forEach(function(b){ mins += DUR[b.type] || 0; });
  return mins/60;
}

// Looks across ALL of this driver's active blocks (any week) for a gap >= 34h between
// one block ending and the next starting -- an HOS "34-hour restart".
function driverRestGaps(driverName){
  const blocks = STATE.blocks.filter(function(b){
    return !b.rejected && (b.driverName||'').trim().toLowerCase()===driverName.trim().toLowerCase();
  }).sort(function(a,b){ return blockStartDT(a)-blockStartDT(b); });
  const gaps = [];
  for(let i=0;i<blocks.length-1;i++){
    const endThis = blockEndDT(blocks[i]);
    const startNext = blockStartDT(blocks[i+1]);
    const gapHours = (startNext - endThis)/3600000;
    if(gapHours >= HOS_RESET_HOURS){
      gaps.push({start: endThis, end: startNext, hours: gapHours});
    }
  }
  return gaps;
}

// Cumulative cycle hours for a driver, starting from their manually-entered baseline
// (hours already on the clock before this tool started tracking them), then walking
// forward through every scheduled block in order. A 34h+ gap between two consecutive
// blocks zeroes the running total (an HOS restart), same as driverRestGaps detects.
// Only counts blocks up to and including the end of the currently viewed week, so
// paging the week forward shows the projected cycle total at that point.
function driverCycleHours(driverName){
  const driver = STATE.drivers.find(function(d){ return d.name.trim().toLowerCase()===driverName.trim().toLowerCase(); });
  const baseline = (driver && typeof driver.cycleHoursUsed==='number') ? driver.cycleHoursUsed : 0;
  const [,we] = weekWindow(VIEW.weekStart);
  const blocks = STATE.blocks.filter(function(b){
    return !b.rejected && (b.driverName||'').trim().toLowerCase()===driverName.trim().toLowerCase() && blockStartDT(b) < we;
  }).sort(function(a,b){ return blockStartDT(a)-blockStartDT(b); });
  let running = baseline;
  let prevEnd = null;
  blocks.forEach(function(b){
    const s = blockStartDT(b), e = blockEndDT(b);
    if(prevEnd && ((s-prevEnd)/3600000) >= HOS_RESET_HOURS) running = 0;
    running += (DUR[b.type]||0)/60;
    prevEnd = e;
  });
  return running;
}

function renderStats(){
  const blocks = currentWeekBlocks();
  const unassignedTruck = blocks.filter(function(b){ return !b.truckId; }).length;
  const unassignedDriver = blocks.filter(function(b){ return !b.driverName; }).length;
  const downTrucks = STATE.trucks.filter(function(t){ return t.status==='down'; }).length;
  const groundedTrucks = STATE.trucks.filter(function(t){ return t.status==='grounded'; }).length;
  const onDownTruck = blocks.filter(function(b){
    if(!b.truckId) return false;
    const t = STATE.trucks.find(function(x){ return x.id===b.truckId; });
    return t && t.status==='down';
  }).length;
  const stat = function(n,l,cls){ return el('div',{class:'stat'+(cls?(' '+cls):'')},[
    el('div',{class:'n disp'}, String(n)), el('div',{class:'l'}, l)
  ]); };
  return el('div',{class:'stats'},[
    stat(blocks.length, 'Blocks this week'),
    stat(STATE.trucks.length, 'Total trucks'),
    stat(downTrucks, 'Trucks down', downTrucks?'warn':''),
    stat(groundedTrucks, 'Trucks grounded', groundedTrucks?'warn':''),
    stat(unassignedTruck, 'No truck', unassignedTruck?'warn':'ok'),
    stat(unassignedDriver, 'No driver', unassignedDriver?'warn':'ok'),
    stat(onDownTruck, 'On a down truck', onDownTruck?'warn':'ok'),
  ]);
}

function renderTimeline(){
  const wrap = el('div',{class:'timeline-wrap'});
  const [ws, we] = weekWindow(VIEW.weekStart);
  const spanMs = we - ws;

  const toggle = el('div',{class:'timeline-toggle'},[
    el('button',{class:'pill-toggle'+(VIEW.timelineBy==='driver'?' active':''), onclick:function(){ VIEW.timelineBy='driver'; render(); }}, 'By Driver (HOS)'),
    el('button',{class:'pill-toggle'+(VIEW.timelineBy==='truck'?' active':''), onclick:function(){ VIEW.timelineBy='truck'; render(); }}, 'By Truck')
  ]);
  wrap.appendChild(toggle);

  if(VIEW.timelineBy==='driver'){
    wrap.appendChild(el('div',{class:'timeline-note'}, '\u24d8 Cycle hours = each driver\u2019s starting cycle (set in Drivers) + scheduled block durations since, resetting to 0 after any 34h+ gap. This is a planning estimate from nominal Solo 1/2/5 windows, not verified drive time or certified HOS compliance. Green bands mark detected 34h+ reset gaps.'));
  }

  const inner = el('div',{class:'timeline-inner'});

  // axis
  const axis = el('div',{class:'timeline-axis'});
  axis.appendChild(el('div',{class:'timeline-axis-label'}, ''));
  const axisTrack = el('div',{class:'timeline-axis-days'});
  for(let i=0;i<7;i++){
    axisTrack.appendChild(el('div',{class:'day'}, DAY_NAMES[i].slice(0,3)+' '+fmtShort(addDays(ws,i))));
  }
  axis.appendChild(axisTrack);
  inner.appendChild(axis);

  function makeBar(b, resourceIsDriver){
    const bs = blockStartDT(b), be = blockEndDT(b);
    const barStart = bs < ws ? ws : bs;
    const barEnd = be > we ? we : be;
    if(barEnd <= barStart) return null;
    const left = ((barStart-ws)/spanMs*100);
    const width = ((barEnd-barStart)/spanMs*100);
    const label = resourceIsDriver
      ? (b.truckId ? (STATE.trucks.find(function(t){return t.id===b.truckId;})||{}).number || '?' : 'no truck')
      : (b.driverName || 'no driver');
    const cls = 'timeline-bar'+(b.type==='solo2'?' solo2':(b.type==='solo5'?' solo5':''))+(b.rejected?' rejected':'');
    return el('div',{class:cls, style:'left:'+left+'%; width:'+width+'%;', title: b.anchorTime+' \u2014 '+label+' \u2014 '+(BLOCK_TYPES.find(function(x){return x.value===b.type;})||{}).label+(b.rejected?' (REJECTED)':'')}, label);
  }

  if(VIEW.timelineBy==='driver'){
    const names = STATE.drivers.map(function(d){ return d.name; })
      .filter(function(n, i, arr){ return arr.indexOf(n)===i; })
      .filter(function(n){ return driverWeeklyHours(n) > 0 || driverCycleHours(n) > 0; })
      .sort(function(a,b2){ return driverCycleHours(b2)-driverCycleHours(a); });

    if(names.length===0){
      inner.appendChild(el('div',{class:'timeline-empty'}, 'No drivers scheduled this week'));
    }

    names.forEach(function(name){
      const hrs = driverCycleHours(name);
      const overCls = hrs>HOS_WEEKLY_LIMIT_HOURS ? ' over' : (hrs>=HOS_WEEKLY_LIMIT_HOURS*0.85 ? ' warn' : '');
      const row = el('div',{class:'timeline-row'});
      row.appendChild(el('div',{class:'timeline-label'},[
        el('div',{}, name),
        el('div',{class:'hrs'+overCls}, Math.round(hrs*10)/10+'h / '+HOS_WEEKLY_LIMIT_HOURS+'h cycle')
      ]));
      const track = el('div',{class:'timeline-track'});
      driverRestGaps(name).forEach(function(g){
        const gs = g.start < ws ? ws : g.start;
        const ge = g.end > we ? we : g.end;
        if(ge <= gs) return;
        const left = ((gs-ws)/spanMs*100), width = ((ge-gs)/spanMs*100);
        track.appendChild(el('div',{class:'timeline-restgap', style:'left:'+left+'%; width:'+width+'%;', title:Math.round(g.hours)+'h rest \u2014 HOS restart'}));
      });
      currentWeekBlocks().filter(function(b){ return (b.driverName||'').trim().toLowerCase()===name.trim().toLowerCase(); })
        .forEach(function(b){ const bar = makeBar(b, true); if(bar) track.appendChild(bar); });
      row.appendChild(track);
      inner.appendChild(row);
    });
  } else {
    const trucks = STATE.trucks.slice().sort(function(a,b2){ return a.number.localeCompare(b2.number); });
    if(trucks.length===0){
      inner.appendChild(el('div',{class:'timeline-empty'}, 'No trucks added yet'));
    }
    trucks.forEach(function(t){
      const row = el('div',{class:'timeline-row'});
      row.appendChild(el('div',{class:'timeline-label'},[
        el('div',{}, t.number),
        el('div',{class:'hrs'}, t.status==='down' ? '\u26d4 Down' : (t.status==='grounded' ? '\u26a0 Grounded' : ''))
      ]));
      const track = el('div',{class:'timeline-track'});
      currentWeekBlocks().filter(function(b){ return b.truckId===t.id; })
        .forEach(function(b){ const bar = makeBar(b, false); if(bar) track.appendChild(bar); });
      row.appendChild(track);
      inner.appendChild(row);
    });
  }

  wrap.appendChild(inner);
  return wrap;
}

function renderBoard(){
  const board = el('div',{class:'board'});
  const today = fmtISO(toDateOnly(new Date()));
  for(let i=0;i<7;i++){
    const date = addDays(VIEW.weekStart, i);
    const iso = fmtISO(date);
    const allDayBlocks = currentWeekBlocks().filter(function(b){ return b.dayIndex===i; });
    const dayBlocks = allDayBlocks.filter(blockMatchesSearch);
    const activeDayBlocks = allDayBlocks.filter(function(b){ return !b.rejected; });
    const rejectedCount = allDayBlocks.length - activeDayBlocks.length;
    const col = el('div',{class:'day-col'});
    const shortage = truckShortageForDay(date);
    const spare = spareTrucksForDay(date);
    const typeCountsLabel = BLOCK_TYPES.map(function(bt){
      const n = activeDayBlocks.filter(function(b){ return b.type===bt.value; }).length;
      return bt.label+' '+n;
    }).join(' \u00b7 ');
    const headChildren = [
      el('div',{class:'dname'}, DAY_NAMES[i]),
      el('div',{class:'ddate mono'}, fmtShort(date)),
      el('div',{class:'day-count'}, typeCountsLabel + ' \u2014 ' + activeDayBlocks.length + ' total' + (rejectedCount ? (' \u00b7 '+rejectedCount+' rejected') : ''))
    ];
    if(shortage>0){
      headChildren.push(el('div',{class:'day-shortage'}, '\u26a0 Short '+shortage+' truck'+(shortage===1?'':'s')));
    }
    headChildren.push(el('div',{class:'day-spare'},
      spare.length ? ('Spare ('+spare.length+'): '+spare.map(function(t){ return t.number; }).join(', ')) : 'Spare: none'
    ));
    col.appendChild(el('div',{class:'day-head'+(iso===today?' today':'')}, headChildren));
    const body = el('div',{class:'day-body'});
    if(dayBlocks.length===0){
      body.appendChild(el('div',{class:'day-empty'}, VIEW.searchQuery.trim() ? 'No matches' : 'No blocks'));
    } else {
      BLOCK_TYPES.forEach(function(bt){
        const group = dayBlocks.filter(function(b){ return b.type===bt.value; })
          .sort(function(a,b){
            if(!!a.rejected !== !!b.rejected) return a.rejected ? 1 : -1;
            return timeToMinutes(a.anchorTime)-timeToMinutes(b.anchorTime);
          });
        if(group.length===0) return;
        const activeInGroup = group.filter(function(b){ return !b.rejected; }).length;
        body.appendChild(el('div',{class:'type-group-label'}, bt.label+' \u00b7 '+activeInGroup+(group.length!==activeInGroup ? (' ('+(group.length-activeInGroup)+' rejected)') : '')));
        group.forEach(function(b){ body.appendChild(renderCard(b)); });
      });
    }
    body.appendChild(el('button',{class:'add-block-btn', onclick:function(){ addManualBlock(i, iso); }}, '+ Add manual block'));
    col.appendChild(body);
    board.appendChild(col);
  }
  return board;
}

function renderCard(b){
  const truckConflict = b.truckId ? checkConflict(b.truckId, b) : null;
  const driverConflict = b.driverName ? checkDriverConflict(b.driverName, b) : null;
  const assignedTruckForConflict = b.truckId ? STATE.trucks.find(function(t){ return t.id===b.truckId; }) : null;
  const isDownForConflict = assignedTruckForConflict && assignedTruckForConflict.status==='down';
  const hasConflict = (!b.rejected) && (truckConflict || driverConflict || isDownForConflict);
  const card = el('div',{class:'card'+(b.type==='solo2'?' solo2':(b.type==='solo5'?' solo5':''))+(hasConflict?' conflict':'')+(b.rejected?' rejected':'')});

  const typeBadge = el('span',{class:'typebadge'},
    (function(){ const bt = BLOCK_TYPES.find(function(x){ return x.value===b.type; }) || BLOCK_TYPES[0]; return bt.label+' \u00b7 '+bt.hours+'h'; })());

  if(b.rejected) card.appendChild(el('div',{class:'rejected-tag'}, '\u2716 REJECTED'));

  card.appendChild(el('div',{class:'row1'},[
    el('div',{},[
      el('div',{class:'time mono'}, b.anchorTime),
      el('div',{class:'endtime'}, fmtEndLabel(b))
    ]),
    typeBadge
  ]));

  const driverSel = el('select',{class:'driver-select'+(!b.driverName?' empty':'')+(driverConflict?' conflictsel':''), onchange:function(e){
    const val = e.target.value;
    if(val==='__new__'){
      const name = window.prompt('New driver name:');
      if(name && name.trim()){
        const trimmed = name.trim();
        if(!STATE.drivers.find(function(d){ return d.name.toLowerCase()===trimmed.toLowerCase(); })){
          STATE.drivers.push({id: uid('drv'), name: trimmed, preferredTruckId:null, cycleHoursUsed:0});
        }
        const test = Object.assign({}, b, {driverName: trimmed});
        const c = checkDriverConflict(trimmed, test);
        if(c){
          showToast('\ud83d\udeab '+trimmed+' is already on block '+(c.blockId||'')+' ('+c.anchorTime+') \u2014 conflicting times', true);
          render();
          return;
        }
        b.driverName = trimmed;
      }
      saveState(); render();
      return;
    }
    if(val){
      const test = Object.assign({}, b, {driverName: val});
      const c = checkDriverConflict(val, test);
      if(c){
        showToast('\ud83d\udeab '+val+' is already on block '+(c.blockId||'')+' ('+c.anchorTime+') \u2014 conflicting times', true);
        render();
        return;
      }
    }
    b.driverName = val;
    saveState(); render();
  }});
  driverSel.appendChild(el('option',{value:''}, '\u2014 No driver \u2014'));
  STATE.drivers.slice().sort(function(a,b2){ return a.name.localeCompare(b2.name); }).forEach(function(d){
    if(d.name!==b.driverName && checkDriverConflict(d.name, Object.assign({}, b, {driverName: d.name}))) return;
    const opt = el('option',{value:d.name}, d.name);
    if(d.name===b.driverName) opt.setAttribute('selected','selected');
    driverSel.appendChild(opt);
  });
  if(b.driverName && !STATE.drivers.find(function(d){ return d.name===b.driverName; })){
    driverSel.appendChild(el('option',{value:b.driverName, selected:'selected'}, b.driverName));
  }
  driverSel.appendChild(el('option',{value:'__new__'}, '+ Add new driver\u2026'));
  card.appendChild(driverSel);
  card.appendChild(el('div',{class:'blockid mono'}, b.blockId || '\u2014'));

  const assignedTruck = b.truckId ? STATE.trucks.find(function(t){ return t.id===b.truckId; }) : null;
  const isGroundedSel = assignedTruck && assignedTruck.status==='grounded';
  const isDownSel = assignedTruck && assignedTruck.status==='down';
  const truckSel = el('select',{class:'truck'+(!b.truckId?' empty':'')+((truckConflict||isDownSel)?' conflictsel':(isGroundedSel?' groundedsel':'')),
    onchange:function(e){
      const val = e.target.value || null;
      if(val){
        const test = Object.assign({}, b, {truckId: val});
        const c = checkConflict(val, test);
        if(c){
          showToast('\ud83d\udeab This truck is already booked on block '+(c.blockId||'')+' ('+c.anchorTime+') \u2014 conflicting times', true);
          render();
          return;
        }
      }
      b.truckId = val;
      saveState(); render();
    }
  });
  truckSel.appendChild(el('option',{value:''}, '\u2014 Select truck \u2014'));
  const activeTrucks = STATE.trucks.filter(function(t){
    if(t.id===b.truckId) return true; // always show the currently assigned truck, even if down/busy, so it stays visible/reassignable
    if(t.status==='down') return false;
    return truckIsFreeFor(t.id, b);
  });
  activeTrucks.forEach(function(t){
    const typeLabel = TRUCK_TYPES.find(function(tt){ return tt.value===(t.vehicleType||'daycab'); });
    const label = (t.status==='down' ? ' (Down)' : (t.status==='grounded' ? ' (Grounded)' : '')) + ' \u00b7 ' + (typeLabel?typeLabel.label:'');
    const opt = el('option',{value:t.id}, t.number + label);
    if(t.id===b.truckId) opt.setAttribute('selected','selected');
    truckSel.appendChild(opt);
  });
  card.appendChild(truckSel);

  if(truckConflict){
    card.appendChild(el('div',{class:'conflictmsg'}, '\u26a0 Truck conflict with block '+(truckConflict.blockId||'')+' \u2014 '+(truckConflict.driverName||'')+' ('+truckConflict.anchorTime+')'));
  }
  if(driverConflict){
    card.appendChild(el('div',{class:'conflictmsg'}, '\u26a0 Driver conflict: also on block '+(driverConflict.blockId||'')+' ('+driverConflict.anchorTime+')'));
  }
  if(isDownSel){
    card.appendChild(el('div',{class:'conflictmsg'}, '\u26d4 Truck '+assignedTruck.number+' is DOWN'+(assignedTruck.note?(' \u2014 '+assignedTruck.note):'')+' \u2014 reassign this block'));
  } else if(!truckConflict && isGroundedSel){
    card.appendChild(el('div',{class:'conflictmsg', style:'color:var(--amber)'}, '\u26a0 Truck '+assignedTruck.number+' is grounded'+(assignedTruck.note?(' \u2014 '+assignedTruck.note):'')+' (still assignable)'));
  }

  const noteInput = el('input',{class:'block-note', value: b.note||'', placeholder:'+ Add note\u2026',
    oninput: function(e){ b.note = e.target.value; },
    onblur: function(e){ b.note = e.target.value.trim(); saveState(); }
  });
  card.appendChild(noteInput);

  card.appendChild(el('div',{class:'foot'},[
    el('span',{class:'src'}, b.source==='csv' ? 'From CSV' : 'Manual'),
    el('div',{style:'display:flex; gap:8px;'},[
      el('button',{class:'reject-btn', onclick:function(){
        b.rejected = !b.rejected;
        saveState(); render();
      }}, b.rejected ? '\u21a9 Restore' : '\u2716 Reject'),
      el('button',{class:'del', onclick:function(){
        if(!window.confirm('Delete this block'+(b.blockId?(' ('+b.blockId+')'):'')+'? This can\u2019t be undone.')) return;
        STATE.blocks = STATE.blocks.filter(function(x){ return x.id!==b.id; }); saveState(); render();
      }}, '\u2715 Delete')
    ])
  ]));

  return card;
}

function addManualBlock(dayIndex, iso){
  const answer = window.prompt('Block type \u2014 enter 1, 2, or 5 (Solo 1 = 14h, Solo 2 = 38h, Solo 5 = 110h):', '1');
  const type = (answer==='2') ? 'solo2' : (answer==='5') ? 'solo5' : 'solo1';
  const b = {
    id: uid('blk'), blockId:'', weekStart: fmtISO(VIEW.weekStart), dayIndex: dayIndex, date: iso,
    anchorTime:'08:00', type: type, driverName:'', truckId:null, source:'manual', rejected:false, note:''
  };
  STATE.blocks.push(b);
  saveState(); render();
}

function parseCSV(text){
  const rows = [];
  let row=[], field='', inQuotes=false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else inQuotes=false; }
      else field+=c;
    } else {
      if(c==='"') inQuotes=true;
      else if(c===','){ row.push(field); field=''; }
      else if(c==='\r'){}
      else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else field+=c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(function(r){ return r.length>1 || (r.length===1 && r[0]!==''); });
}

function handleCsvFile(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    let text = ev.target.result;
    if(text.charCodeAt(0)===0xFEFF) text = text.slice(1);
    const rows = parseCSV(text);
    if(rows.length<2){ showToast('The file is empty or the format is wrong', true); return; }
    const header = rows[0].map(function(h){ return h.trim(); });
    const idx = function(name){ return header.findIndex(function(h){ return h.toLowerCase()===name.toLowerCase(); }); };
    let iBlock = idx('Block ID');
    let iDriver = idx('Driver Name');
    if(iDriver===-1) iDriver = idx('Driver');
    let iArrival = idx('Stop 1 Yard Arrival');
    let iArrivalDate = idx('Stop 1 Planned Arrival Date');
    let iArrivalTime = idx('Stop 1 Planned Arrival Time');
    let iOperator = idx('Operator ID');
    const hasCombined = iArrival!==-1;
    const hasSplit = iArrivalDate!==-1 && iArrivalTime!==-1;
    if(iBlock===-1 || iDriver===-1 || (!hasCombined && !hasSplit)){
      showToast('Required columns (Block ID / Driver Name / Stop 1 Arrival date+time) were not found in this file', true);
      return;
    }
    function detectType(operatorId){
      if(!operatorId) return null;
      const m = operatorId.match(/solo\s*(\d+)/i);
      if(!m) return null;
      const n = m[1];
      return (n==='1'||n==='2'||n==='5') ? ('solo'+n) : null;
    }
    const groups = {};
    for(let r=1;r<rows.length;r++){
      const row = rows[r];
      if(!row || row.length<3) continue;
      const blockId = (row[iBlock]||'').trim();
      const driver = (row[iDriver]||'').trim();
      const dtRaw = hasCombined ? row[iArrival] : ((row[iArrivalDate]||'').trim()+' '+(row[iArrivalTime]||'').trim());
      const dt = parseCsvDT(dtRaw);
      const detectedType = iOperator!==-1 ? detectType((row[iOperator]||'').trim()) : null;
      if(!blockId || !dt) continue;
      if(!groups[blockId]) groups[blockId] = { blockId: blockId, driver: driver, dt: dt, type: detectedType };
      else if(dt < groups[blockId].dt){ groups[blockId].dt = dt; if(driver) groups[blockId].driver = driver; }
      if(!groups[blockId].driver && driver) groups[blockId].driver = driver;
      if(!groups[blockId].type && detectedType) groups[blockId].type = detectedType;
    }
    const parsed = Object.values(groups).map(function(g){ return {
      blockId: g.blockId,
      driverName: g.driver,
      date: fmtISO(toDateOnly(g.dt)),
      anchorTime: String(g.dt.getHours()).padStart(2,'0')+':'+String(g.dt.getMinutes()).padStart(2,'0'),
      type: g.type || 'solo1'
    }; });
    parsed.sort(function(a,b){ return (a.date+a.anchorTime).localeCompare(b.date+b.anchorTime); });
    VIEW.editingCsv = { parsed: parsed, fileName: file.name };
    render();
  };
  reader.readAsText(file);
  e.target.value = '';
}

      el('td',{}, typeSel)
    ]));
  });
  body.appendChild(table);
  modal.appendChild(body);

  modal.appendChild(el('div',{class:'modal-foot'},[
    el('button',{class:'btn', onclick:function(){ VIEW.editingCsv=null; render(); }}, 'Cancel'),
    el('button',{class:'btn primary', onclick:function(){ confirmCsvImport(data.parsed); }}, 'Confirm import of '+data.parsed.length+' blocks')
  ]));

function confirmCsvImport(parsed){
  let added=0, updated=0;
  parsed.forEach(function(p){
    const dateObj = new Date(p.date+'T00:00:00');
    const ws = fmtISO(getWeekStart(dateObj));
    const dayIndex = dateObj.getDay();
    const existing = STATE.blocks.find(function(b){ return b.blockId===p.blockId && p.blockId!==''; });
    if(existing){
      existing.driverName = p.driverName || existing.driverName;
      existing.anchorTime = p.anchorTime;
      existing.date = p.date;
      existing.weekStart = ws;
      existing.dayIndex = dayIndex;
      existing.type = p.type;
      updated++;
    } else {
      STATE.blocks.push({
        id: uid('blk'), blockId: p.blockId, weekStart: ws, dayIndex: dayIndex, date: p.date,
        anchorTime: p.anchorTime, type: p.type, driverName: p.driverName, truckId: null, source:'csv', rejected:false, note:''
      });
      added++;
    }
    if(p.driverName && !STATE.drivers.find(function(d){ return d.name.toLowerCase()===p.driverName.toLowerCase(); })){
      STATE.drivers.push({id: uid('drv'), name: p.driverName, preferredTruckId:null, cycleHoursUsed:0});
    }
  });
  saveState();
  VIEW.editingCsv = null;
  showToast('Done: '+added+' new block(s), '+updated+' updated');
  render();
}

function ensureDatalist(){
  let dl = document.getElementById('driverlist');
  if(!dl){ dl = document.createElement('datalist'); dl.id='driverlist'; document.body.appendChild(dl); }
  dl.innerHTML='';
  STATE.drivers.forEach(function(d){ dl.appendChild(el('option',{value:d.name})); });
}
